// --- LIVE SUPABASE SERVICE EXAMPLE ---
// Swap backend = mockBackend to backend = supabaseBackend after configuration.
const supabaseBackend = {
  async signUp({ email, password, name }) {
    if (!supabase) return { ...demoUser, email, name };

    const { data, error } = await supabase.auth.signUp({ email, password });
    if (error) throw error;

    const userId = data.user?.id;
    if (userId) {
      const { error: profileError } = await supabase.from("users").upsert({
        id: userId,
        name,
        intent: "Serious",
        values: ["Faith", "Family", "Business"],
        verified: false,
        premium: false,
      });
      if (profileError) throw profileError;
    }

    currentUser = {
      ...demoUser,
      id: userId || demoUser.id,
      email,
      name,
      verified: false,
      premium: false,
    };

    return currentUser;
  },
  async signIn({ email, password }) {
    if (!supabase) return { ...demoUser, email };

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;

    const userId = data.user?.id;
    const { data: profile, error: profileError } = await supabase
      .from("users")
      .select("*")
      .eq("id", userId)
      .single();

    if (profileError && profileError.code !== "PGRST116") throw profileError;

    currentUser = {
      ...demoUser,
      ...profile,
      id: userId || demoUser.id,
      email,
      name: profile?.name || email.split("@")[0],
      values: profile?.values?.length ? profile.values : demoUser.values,
    };

    return currentUser;
  },
  async signOut() {
    if (!supabase) return true;
    const { error } = await supabase.auth.signOut();
    if (error) throw error;
    currentUser = demoUser;
    return true;
  },
  async getCurrentSession() {
    if (!supabase) return null;
    const { data, error } = await supabase.auth.getSession();
    if (error) throw error;
    return data.session;
  },
  async hydrateSessionUser() {
    if (!supabase) return null;

    const session = await this.getCurrentSession();
    const authUser = session?.user;
    if (!authUser) return null;

    const { data: profile, error } = await supabase
      .from("users")
      .select("*")
      .eq("id", authUser.id)
      .single();

    if (error && error.code !== "PGRST116") throw error;

    currentUser = {
      ...demoUser,
      ...profile,
      id: authUser.id,
      email: authUser.email,
      name: profile?.name || authUser.email?.split("@")[0] || "Member",
      values: profile?.values?.length ? profile.values : demoUser.values,
    };

    return currentUser;
  },
  async getProfiles() {
    if (!supabase) return initialPeople;

    const { data, error } = await supabase
      .from("users")
      .select("id,name,age,city,bio,intent,values,photos,verified,premium")
      .neq("id", currentUser.id)
      .limit(25);

    if (error) throw error;

    if (!data?.length) return initialPeople;

    return data.map((profile, index) => ({
      id: profile.id,
      name: profile.name || "Member",
      age: profile.age || 30,
      city: profile.city || "Nearby",
      distance: "Nearby",
      vibe: profile.values?.join(", ") || profile.intent || "Intentional dating",
      badge: profile.premium ? "Premium" : profile.verified ? "Verified" : "Member",
      verified: profile.verified,
      premium: profile.premium,
      photo: profile.photos?.[0] || initialPeople[index % initialPeople.length].photo,
      prompt: profile.bio || "Looking for honest connection, clear communication, and alignment.",
      match: 90,
    }));
  },
  async getChats() {
    if (!supabase) return initialChats;

    const { data, error } = await supabase
      .from("messages")
      .select("id, match_id, body, read, created_at")
      .order("created_at", { ascending: false })
      .limit(25);

    if (error) throw error;
    if (!data?.length) return initialChats;

    return data.map((msg, index) => ({
      id: msg.id,
      matchId: msg.match_id,
      name: `Match ${index + 1}`,
      message: msg.body,
      time: "Now",
      unread: !msg.read,
      intent: "Active",
    }));
  },
  async likeProfile({ fromUserId, toUser }) {
    if (!supabase) return mockBackend.likeProfile({ fromUserId, toUser });

    const compatibility = calculateCompatibility(currentUser, toUser);
    const isMatch = compatibility >= 90;

    const { error: likeError } = await supabase
      .from("likes")
      .upsert({ from_user_id: fromUserId, to_user_id: toUser.id }, { onConflict: "from_user_id,to_user_id" });

    if (likeError) throw likeError;

    if (!isMatch) return { like: true, match: null };

    const { data, error } = await supabase
      .from("matches")
      .insert({ user_a_id: fromUserId, user_b_id: toUser.id, compatibility_score: compatibility })
      .select()
      .single();

    if (error) throw error;
    return { like: true, match: data };
  },
  async sendMessage({ matchId, body }) {
    if (!supabase || matchId === "demo_match") return mockBackend.sendMessage({ matchId, body });

    const { data, error } = await supabase
      .from("messages")
      .insert({ match_id: matchId, sender_id: currentUser.id, body })
      .select()
      .single();

    if (error) throw error;
    return {
      id: data.id,
      matchId: data.match_id,
      senderId: data.sender_id,
      body: data.body,
      read: data.read,
      createdAt: data.created_at,
    };
  },
  async createDatePlan({ matchId, idea }) {
    if (!supabase || matchId === "demo_match") return mockBackend.createDatePlan({ matchId, idea });

    const { data, error } = await supabase
      .from("date_plans")
      .insert({ match_id: matchId, title: idea.title, place: idea.place, budget: idea.cost })
      .select()
      .single();

    if (error) throw error;
    return data;
  },
  async reportUser({ reportedUserId, reason }) {
    if (!supabase) return mockBackend.reportUser({ reportedUserId, reason });

    const { data, error } = await supabase
      .from("reports")
      .insert({ reporter_id: currentUser.id, reported_user_id: reportedUserId, reason })
      .select()
      .single();

    if (error) throw error;
    return data;
  },
  async startSubscription(plan) {
    if (!supabase) return mockBackend.startSubscription(plan);

    const { data, error } = await supabase
      .from("subscriptions")
      .insert({ user_id: currentUser.id, plan, status: "Active" })
      .select()
      .single();

    if (error) throw error;
    return data;
  },
};

