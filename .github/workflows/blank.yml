-- BASIC RLS POLICIES
-- Users can view dating profiles, but only update their own profile.
create policy "Public profiles are viewable" on users
  for select using (true);

create policy "Users can insert own profile" on users
  for insert with check (auth.uid() = id);

create policy "Users can update own profile" on users
  for update using (auth.uid() = id);

-- Likes: users can create and view likes they sent or received.
create policy "Users can create own likes" on likes
  for insert with check (auth.uid() = from_user_id);

create policy "Users can view related likes" on likes
  for select using (auth.uid() = from_user_id or auth.uid() = to_user_id);

-- Matches: users can view matches they belong to.
create policy "Users can view own matches" on matches
  for select using (auth.uid() = user_a_id or auth.uid() = user_b_id);

create policy "Users can create own matches" on matches
  for insert with check (auth.uid() = user_a_id or auth.uid() = user_b_id);

-- Messages: users can send/read messages only for their matches.
create policy "Users can read match messages" on messages
  for select using (
    exists (
      select 1 from matches
      where matches.id = messages.match_id
      and (matches.user_a_id = auth.uid() or matches.user_b_id = auth.uid())
    )
  );

create policy "Users can send match messages" on messages
  for insert with check (
    auth.uid() = sender_id and exists (
      select 1 from matches
      where matches.id = messages.match_id
      and (matches.user_a_id = auth.uid() or matches.user_b_id = auth.uid())
    )
  );

-- Reports: users can create reports and view only their own reports.
create policy "Users can create reports" on reports
  for insert with check (auth.uid() = reporter_id);

create policy "Users can view own reports" on reports
  for select using (auth.uid() = reporter_id);

-- Subscriptions: users can view their own subscription rows.
create policy "Users can view own subscriptions" on subscriptions
  for select using (auth.uid() = user_id);

create policy "Users can create own subscription demo" on subscriptions
  for insert with check (auth.uid() = user_id);

-- Date plans: users can create/read plans only for their own matches.
create policy "Users can view own date plans" on date_plans
  for select using (
    exists (
      select 1 from matches
      where matches.id = date_plans.match_id
      and (matches.user_a_id = auth.uid() or matches.user_b_id = auth.uid())
    )
  );

create policy "Users can create own date plans" on date_plans
  for insert with check (
    exists (
      select 1 from matches
      where matches.id = date_plans.match_id
      and (matches.user_a_id = auth.uid() or matches.user_b_id = auth.uid())
    )
  );

