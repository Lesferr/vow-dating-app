            <div className="absolute top-5 left-5 flex gap-2">
              <span className="bg-black/45 backdrop-blur-xl border border-white/15 rounded-full px-3 py-1 text-xs flex items-center gap-1"><ShieldCheck size={13} /> {person.badge}</span>
              <span className="bg-rose-200 text-neutral-950 rounded-full px-3 py-1 text-xs font-bold">{compatibility}% Match</span>
            </div>
            <div className="absolute bottom-0 p-6 space-y-3">
              <div>
                <h2 className="text-4xl font-semibold">{person.name}, {person.age}</h2>
                <p className="text-white/75 flex items-center gap-1 mt-1"><MapPin size={15} /> {person.city} • {person.distance}</p>
              </div>
              <p className="text-sm text-rose-100/90">{person.vibe}</p>
              <p className="text-white/85 leading-relaxed">“{person.prompt}”</p>
            </div>
          </div>
        </CardContent>
      </Card>
      <div className="flex items-center justify-center gap-5 mt-6">
        <button onClick={onNext} className="w-16 h-16 rounded-full bg-white/10 border border-white/15 flex items-center justify-center"><X /></button>
        <button onClick={() => onLike(person)} className="w-20 h-20 rounded-full bg-rose-200 text-neutral-950 shadow-xl shadow-rose-500/20 flex items-center justify-center"><Heart fill="currentColor" /></button>
        <button className="w-16 h-16 rounded-full bg-white/10 border border-white/15 flex items-center justify-center"><Star /></button>
      </div>
    </motion.div>
  );
}

function Discover({ profiles, backendStatus, onLike, onReport }) {
  const [index, setIndex] = useState(0);
  const current = profiles[index % profiles.length];
  const next = () => setIndex((prev) => prev + 1);
  return (
    <div className="pb-24">
      <Header status={backendStatus} />
      <div className="px-6 mb-4 flex items-center gap-3">
        <div className="flex-1 h-12 rounded-2xl bg-white/10 border border-white/10 px-4 flex items-center gap-2 text-white/50"><Search size={17} /> Values, city, lifestyle</div>
        <button className="h-12 px-4 rounded-2xl bg-rose-200 text-neutral-950 font-semibold">Filter</button>
      </div>
      <SafetyStrip onReport={() => onReport(current)} />
      <AnimatePresence mode="wait">
        <MatchCard person={current} onNext={next} onLike={async (person) => { await onLike(person); next(); }} />
      </AnimatePresence>
    </div>
  );
}

