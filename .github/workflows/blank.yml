function calculateCompatibility(user, candidate) {
  let score = 70;
  const candidateText = `${candidate.vibe} ${candidate.prompt}`.toLowerCase();
  user.values.forEach((value) => {
    if (candidateText.includes(value.toLowerCase())) score += 5;
  });
  if (user.intent === "Serious" && candidate.match >= 90) score += 10;
  if (candidate.verified) score += 4;
  if (candidate.premium) score += 3;
  return Math.min(score, 99);
}

