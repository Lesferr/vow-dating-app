export default function DatingAppPrototype() {
  const [started, setStarted] = useState(false);
  const [authUser, setAuthUser] = useState(null);
  const [tab, setTab] = useState("discover");
  const [profiles, setProfiles] = useState(initialPeople);
  const [chats, setChats] = useState(initialChats);
  const [matches, setMatches] = useState([]);
  const [backendStatus, setBackendStatus] = useState(USE_SUPABASE ? "Supabase connected" : "Mock backend connected — add Supabase env keys");

  useEffect(() => {
    async function bootBackend() {
      try {
        const sessionUser = await backend.hydrateSessionUser();
        if (sessionUser) {
          setAuthUser(sessionUser);
          setStarted(true);
        }
        const loadedProfiles = await backend.getProfiles();
        const loadedChats = await backend.getChats();
        setProfiles(loadedProfiles);
        setChats(loadedChats);
        setBackendStatus(sessionUser ? `Session restored for ${sessionUser.email}` : USE_SUPABASE ? "Supabase live database connected" : "Mock backend connected — add Supabase env keys");
      } catch (error) {
        setBackendStatus(error.message || "Backend connection failed");
      }
    }
    bootBackend();
  }, []);

  async function handleLike(person) {
    const result = await backend.likeProfile({ fromUserId: currentUser.id, toUser: person });
    setBackendStatus(result.match ? `Match created with ${person.name}` : `Like saved for ${person.name}`);
    if (result.match) setMatches((prev) => [...prev, result.match]);
  }

  async function handleReport(person) {
    const result = await backend.reportUser({ reportedUserId: person.id, reason: "User review requested" });
    setBackendStatus(`Safety report ${result.status}`);
  }

  const screen = useMemo(() => {
    if (tab === "messages") return <Messages chats={chats} matches={matches} onSendMessage={(body) => backend.sendMessage({ matchId: matches[0]?.id || "demo_match", body })} />;
    if (tab === "dates") return <Dates onCreateDatePlan={(idea) => backend.createDatePlan({ matchId: matches[0]?.id || "demo_match", idea })} />;
    if (tab === "premium") return <Premium onSubscribe={(plan) => backend.startSubscription(plan)} />;
    if (tab === "profile") return <Profile user={authUser} onLogout={async () => { await backend.signOut(); setAuthUser(null); setStarted(false); setBackendStatus(USE_SUPABASE ? "Signed out — Supabase ready" : "Signed out — mock backend ready"); }} />;
    return <Discover profiles={profiles} backendStatus={backendStatus} onLike={handleLike} onReport={handleReport} />;
  }, [tab, profiles, backendStatus, matches, chats]);

  if (!started) return <AuthScreen onAuth={(user) => { setAuthUser(user); setStarted(true); setBackendStatus(`Signed in as ${user.email}`); }} />;

  return (
    <PhoneFrame>
      <div className="min-h-[860px] bg-[#120d10] relative">
        {screen}
        <div className="absolute bottom-5 left-5 right-5 rounded-[2rem] bg-black/65 backdrop-blur-2xl border border-white/10 p-2 grid grid-cols-5 gap-1">
          <button onClick={() => setTab("discover")} className={`h-14 rounded-2xl flex flex-col items-center justify-center gap-1 ${tab === "discover" ? "bg-rose-200 text-neutral-950" : "text-white/60"}`}><Heart size={17} /><span className="text-[10px] font-medium">Match</span></button>
          <button onClick={() => setTab("messages")} className={`h-14 rounded-2xl flex flex-col items-center justify-center gap-1 ${tab === "messages" ? "bg-rose-200 text-neutral-950" : "text-white/60"}`}><MessageCircle size={17} /><span className="text-[10px] font-medium">Chat</span></button>
          <button onClick={() => setTab("dates")} className={`h-14 rounded-2xl flex flex-col items-center justify-center gap-1 ${tab === "dates" ? "bg-rose-200 text-neutral-950" : "text-white/60"}`}><CalendarDays size={17} /><span className="text-[10px] font-medium">Dates</span></button>
          <button onClick={() => setTab("premium")} className={`h-14 rounded-2xl flex flex-col items-center justify-center gap-1 ${tab === "premium" ? "bg-rose-200 text-neutral-950" : "text-white/60"}`}><Crown size={17} /><span className="text-[10px] font-medium">Plus</span></button>
          <button onClick={() => setTab("profile")} className={`h-14 rounded-2xl flex flex-col items-center justify-center gap-1 ${tab === "profile" ? "bg-rose-200 text-neutral-950" : "text-white/60"}`}><User size={17} /><span className="text-[10px] font-medium">Me</span></button>
        </div>
      </div>
    </PhoneFrame>
  );
}
